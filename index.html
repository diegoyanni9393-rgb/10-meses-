<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Nuestra Historia uwu</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:black;
    color:white;
    overflow:hidden;
    text-align:center;
}

/* estrellas */
canvas#stars{
    position:fixed;
    top:0;left:0;
    z-index:-1;
}

/* contenedor */
.container{
    max-width:600px;
    margin:auto;
    padding:20px;
}

/* botón */
button{
    padding:12px 25px;
    background:#ff4d6d;
    border:none;
    color:white;
    border-radius:10px;
    cursor:pointer;
    animation:pulse 1.5s infinite;
}

@keyframes pulse{
    0%{transform:scale(1);}
    50%{transform:scale(1.1);}
    100%{transform:scale(1);}
}

/* TETRIS */
#tetris{
    display:none;
}

.tetris-wrapper{
    display:flex;
    justify-content:center;
    align-items:center;
    gap:15px;
}

.side-img{
    width:80px;
    height:140px;
    object-fit:cover;
    border-radius:10px;
}

#game{
    background:#111;
    border:2px solid white;
}

/* carta */
#carta{
    display:none;
    height:80vh;
    overflow-y:auto;
    text-align:left;
    padding:20px;
}
</style>
</head>

<body>

<canvas id="stars"></canvas>

<audio id="music" loop>
<source src="musica.mp3.mp3" type="audio/mpeg">
</audio>

<div class="container" id="app"></div>

<!-- TETRIS -->
<div id="tetris">
    <div class="tetris-wrapper">

        <img src="foto_izq.jpg.jpeg" class="side-img">

        <div>
            <canvas id="game" width="200" height="320"></canvas>
            <p id="score">Puntaje: 0</p>
        </div>

        <img src="foto_der.jpg.jpeg" class="side-img">

    </div>
</div>

<div id="carta"></div>

<script>
/* estrellas */
const starCanvas=document.getElementById("stars");
const sctx=starCanvas.getContext("2d");
starCanvas.width=innerWidth;
starCanvas.height=innerHeight;

let stars=Array(100).fill().map(()=>({
    x:Math.random()*innerWidth,
    y:Math.random()*innerHeight
}));

function drawStars(){
    sctx.clearRect(0,0,innerWidth,innerHeight);
    stars.forEach(s=>{
        sctx.fillRect(s.x,s.y,2,2);
        s.y+=0.3;
        if(s.y>innerHeight)s.y=0;
    });
    requestAnimationFrame(drawStars);
}
drawStars();

/* música */
function playMusic(){
    let m = document.getElementById("music");
    m.volume = 0.3;
    m.play();
}

function startExperience(){
    playMusic();
    next();
}

/* historia */
let step=0;

function render(){
const app=document.getElementById("app");

if(step===0){
app.innerHTML=`
<img src="foto_inicio.jpg.jpeg" style="width:100%; border-radius:10px;">
<h1>Hola amor ❤️</h1>
<button onclick="startExperience()">Continuar</button>`;
}

if(step===1){
app.innerHTML=`<p>Primero... un poquito de juego uwu</p>
<button onclick="next()">Jugar</button>`;
}

if(step===2){
app.style.display="none";
document.getElementById("tetris").style.display="block";
startGame();
}

if(step===3){
document.getElementById("tetris").style.display="none";
app.style.display="block";
app.innerHTML=`<h2 id="msg"></h2>
<button onclick="next()">Seguir</button>`;
}

if(step===4){
app.innerHTML=`<p>Ahora quiero que leas esta pequeña carta mi vida</p>
<button onclick="next()">Leer</button>`;
}

if(step===5){
app.style.display="none";
let carta=document.getElementById("carta");
carta.style.display="block";
carta.innerText="(TU CARTA AQUÍ)";
}
}

function next(){
step++;
render();
}

/* TETRIS */
const canvas=document.getElementById("game");
const ctx=canvas.getContext("2d");
const COLS=10, ROWS=20, SIZE=20;

let board, piece, score, gameOver;

const shapes = [
    {shape:[[1,1,1],[0,1,0]], color:"purple"},
    {shape:[[1,1],[1,1]], color:"yellow"},
    {shape:[[1,1,0],[0,1,1]], color:"green"},
    {shape:[[0,1,1],[1,1,0]], color:"red"},
    {shape:[[1,1,1,1]], color:"cyan"}
];

function newPiece(){
    const p = shapes[Math.floor(Math.random()*shapes.length)];
    return {x:3, y:0, shape:p.shape, color:p.color};
}

function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);

    board.forEach((row,y)=>{
        row.forEach((cell,x)=>{
            if(cell){
                ctx.fillStyle = cell;
                ctx.fillRect(x*SIZE,y*SIZE,SIZE,SIZE);
            }
        });
    });

    piece.shape.forEach((row,y)=>{
        row.forEach((v,x)=>{
            if(v){
                ctx.fillStyle = piece.color;
                ctx.fillRect((piece.x+x)*SIZE,(piece.y+y)*SIZE,SIZE,SIZE);
            }
        });
    });
}

function drop(){
    piece.y++;

    if(collide()){
        piece.y--; // vuelve atrás

        merge();   // fija la pieza en el tablero
        clearLines();

        piece = newPiece();

        // 👇 si ya choca al aparecer = game over
        if(collide()){
            gameOver = true;
            endGame();
            return;
        }
    }
}

function merge(){
    piece.shape.forEach((row,y)=>{
        row.forEach((v,x)=>{
            if(v){
                board[piece.y + y][piece.x + x] = piece.color;
            }
        });
    });
}

function clearLines(){
    let newBoard = board.filter(row => row.some(cell => !cell));
    let cleared = ROWS - newBoard.length;

    while(newBoard.length < ROWS){
        newBoard.unshift(Array(COLS).fill(0));
    }

    board = newBoard;
    score += cleared * 10;

    document.getElementById("score").innerText = "Puntaje: " + score;
}

function drop(){
piece.y++;
if(collide()){
piece.y--;
merge();
clearLines();
piece=newPiece();
if(collide()){
gameOver=true;
endGame();
}
}
}

function move(dir){
piece.x+=dir;
if(collide()) piece.x-=dir;
}

document.addEventListener("keydown",e=>{
if(gameOver)return;
if(e.key==="ArrowLeft")move(-1);
if(e.key==="ArrowRight")move(1);
if(e.key==="ArrowDown")drop();
});

function loop(){
    if(gameOver) return;

    drop();
    draw();

    setTimeout(loop, 500);
}

function startGame(){
board=Array.from({length:ROWS},()=>Array(COLS).fill(0));
piece=newPiece();
score=0;
gameOver=false;
loop();
}

function endGame(){
let msg=document.getElementById("msg");
msg.innerText = score>=100
? "Sabía que podías hacerlo ❤️"
: "No importa… igual te elegiría siempre ❤️";

step=3;
render();
}

render();
</script>

</body>
</html>
